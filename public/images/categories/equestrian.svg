<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="الفروسية — Equestrian">
  <defs>
    <linearGradient id="eqBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16205C"/>
      <stop offset="1" stop-color="#2E47A0"/>
    </linearGradient>
    <pattern id="eqStars" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <g fill="none" stroke="#E3B505" stroke-width="1.4" opacity="0.14">
        <path d="M40 8 L52 28 L72 40 L52 52 L40 72 L28 52 L8 40 L28 28 Z"/>
        <rect x="20" y="20" width="40" height="40" transform="rotate(45 40 40)"/>
      </g>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#eqBg)"/>
  <rect width="800" height="600" fill="url(#eqStars)"/>
  <rect x="24" y="24" width="752" height="552" fill="none" stroke="#E3B505" stroke-width="3" opacity="0.7"/>
  <rect x="36" y="36" width="728" height="528" fill="none" stroke="#E3B505" stroke-width="1" opacity="0.4"/>
  <!-- horse + rider (jumping) silhouette -->
  <g fill="#E3B505">
    <path d="M250 430
      c-8-40 4-78 40-96 c18-9 40-10 60-6 c14-30 40-50 78-52 c-6 8-8 18-6 28
      c22 2 42 14 54 34 c16-6 34-4 48 6 c-14 6-24 16-28 30 c8 14 10 30 6 46
      c-10-18-26-30-46-34 c4 16 2 32-6 46 c-6-22-20-40-40-50 c-26-6-52 0-72 18
      c-24 22-34 54-30 86 c-16-2-30-12-38-26 c-16 8-34 10-52 4 c14-6 24-18 28-34 Z"/>
    <!-- legs -->
    <path d="M300 452 l-10 74 l16 0 l12-64 Z"/>
    <path d="M356 462 l6 66 l16 0 l-8-70 Z"/>
    <path d="M470 452 l14 72 l16 0 l-12-78 Z"/>
    <path d="M520 438 l24 60 l15 0 l-24-70 Z"/>
    <!-- rider -->
    <circle cx="392" cy="300" r="17"/>
    <path d="M392 318 c22 4 34 22 34 46 c0 12-6 22-16 28 c-14-6-24-18-28-34 c-4-16-2-30 10-40 Z"/>
  </g>
  <!-- ground line -->
  <rect x="120" y="528" width="560" height="4" rx="2" fill="#E3B505" opacity="0.5"/>
</svg>
